id: {{ slug }}
level: validation_policy
title: "{{ title }}"
short_code: "{{ short_code }}"
created_at: {{ created_at }}
updated_at: {{ updated_at }}
parent_id: {{ parent_id }}
archived: {{ archived }}
applies_to: "{{ applies_to }}"

required_validations:
{% for v in required_validations %}  - "{{ v }}"
{% endfor %}

tags:
