name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            use-cross: false

          - target: x86_64-apple-darwin
            runner: macos-latest
            use-cross: false

          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            use-cross: false

          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04
            use-cross: true

          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            use-cross: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --locked

      - name: Build CLI binary
        run: |
          ${{ matrix.use-cross && 'cross' || 'cargo' }} build \
            --release \
            --target ${{ matrix.target }} \
            -p ultra-metis-cli
        shell: bash

      - name: Build MCP binary
        run: |
          ${{ matrix.use-cross && 'cross' || 'cargo' }} build \
            --release \
            --target ${{ matrix.target }} \
            -p ultra-metis-mcp
        shell: bash

      - name: Upload binaries (unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/ultra-metis
            target/${{ matrix.target }}/release/ultra-metis-mcp
          if-no-files-found: error

      - name: Upload binaries (windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/ultra-metis.exe
            target/${{ matrix.target }}/release/ultra-metis-mcp.exe
          if-no-files-found: error

  package:
    name: Package and Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*

      - name: Package release artifacts
        run: bash scripts/package.sh "${{ github.ref_name }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt
          generate_release_notes: true
