name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            use-cross: false

          - target: x86_64-apple-darwin
            runner: macos-latest
            use-cross: false

          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            use-cross: false

          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04
            use-cross: true

          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            use-cross: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --locked

      - name: Build CLI binary
        run: |
          ${{ matrix.use-cross && 'cross' || 'cargo' }} build \
            --release \
            --target ${{ matrix.target }} \
            -p cadre-cli
        shell: bash

      - name: Build MCP binary
        run: |
          ${{ matrix.use-cross && 'cross' || 'cargo' }} build \
            --release \
            --target ${{ matrix.target }} \
            -p cadre-mcp
        shell: bash

      - name: Upload binaries (unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/cadre
            target/${{ matrix.target }}/release/cadre-mcp
          if-no-files-found: error

      - name: Upload binaries (windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/cadre.exe
            target/${{ matrix.target }}/release/cadre-mcp.exe
          if-no-files-found: error

  package:
    name: Package and Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*

      - name: Package release artifacts
        run: bash scripts/package.sh "${{ github.ref_name }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt
          generate_release_notes: true

      - name: Upload SHA256SUMS as artifact for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: sha256sums
          path: dist/SHA256SUMS.txt

  update-homebrew:
    name: Update Homebrew Formula
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Download SHA256SUMS
        uses: actions/download-artifact@v4
        with:
          name: sha256sums

      - name: Extract version and checksums
        id: info
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          ARM64_SHA=$(grep "aarch64-apple-darwin" SHA256SUMS.txt | awk '{print $1}')
          X86_64_SHA=$(grep "x86_64-apple-darwin" SHA256SUMS.txt | awk '{print $1}')
          echo "arm64_sha=${ARM64_SHA}" >> "$GITHUB_OUTPUT"
          echo "x86_64_sha=${X86_64_SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: dcassil/homebrew-cadre
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          cd homebrew-tap
          FORMULA="Formula/cadre.rb"

          # Update version
          sed -i 's/version ".*"/version "${{ steps.info.outputs.version }}"/' "$FORMULA"

          # Update ARM64 SHA256
          # Find the sha256 line after the arm? block
          sed -i '/aarch64-apple-darwin/{n;s/sha256 ".*"/sha256 "${{ steps.info.outputs.arm64_sha }}"/}' "$FORMULA"

          # Update x86_64 SHA256
          sed -i '/x86_64-apple-darwin/{n;s/sha256 ".*"/sha256 "${{ steps.info.outputs.x86_64_sha }}"/}' "$FORMULA"

          echo "Updated formula:"
          cat "$FORMULA"

      - name: Commit and push formula update
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/cadre.rb
          git commit -m "Update cadre to ${{ github.ref_name }}"
          git push
