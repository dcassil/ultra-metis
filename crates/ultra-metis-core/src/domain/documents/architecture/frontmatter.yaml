id: {{ slug }}
level: architecture
title: "{{ title }}"
short_code: "{{ short_code }}"
created_at: {{ created_at }}
updated_at: {{ updated_at }}
archived: {{ archived }}
parent_id: {{ parent_id }}

tags:
{% for tag in tags %}  - "{{ tag }}"
{% endfor %}

exit_criteria_met: {{ exit_criteria_met }}
schema_version: 1
epic_id: {{ epic_id }}

source_reference_architecture: {{ source_reference_architecture }}
locked: {{ locked }}
baseline_score: {{ baseline_score }}
completion_score: {{ completion_score }}
drift_tolerance: {{ drift_tolerance }}
relevant_layers:
{% for item in relevant_layers %}  - "{{ item }}"
{% endfor %}
relevant_boundaries:
{% for item in relevant_boundaries %}  - "{{ item }}"
{% endfor %}
applicable_dependency_rules:
{% for item in applicable_dependency_rules %}  - "{{ item }}"
{% endfor %}
applicable_naming_conventions:
{% for item in applicable_naming_conventions %}  - "{{ item }}"
{% endfor %}
applicable_anti_patterns:
{% for item in applicable_anti_patterns %}  - "{{ item }}"
{% endfor %}
checklist:
{% for item in checklist %}  - question: "{{ item.question }}"
    answer: {{ item.answer }}
    story_types:
{% for st in item.story_types %}      - "{{ st }}"
{% endfor %}{% endfor %}
unlock_history:
{% for item in unlock_history %}  - actor: "{{ item.actor }}"
    timestamp: "{{ item.timestamp }}"
    reason: "{{ item.reason }}"
{% endfor %}